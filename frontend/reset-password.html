<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir Senha — Cloudd Agenda</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <h1>Cloudd Agenda</h1>
          <p id="headerSubtitle">Redefinição de Senha</p>
        </div>
      </div>

      <div class="login-body">

        <!-- Etapa 1: Solicitar link por email -->
        <div id="stepRequest">
          <p class="step-info">Digite seu email de cadastro e enviaremos um link para redefinir sua senha.</p>
          <form id="requestForm">
            <div class="form-group">
              <label for="reqEmail">E-mail</label>
              <input type="email" id="reqEmail" placeholder="Digite seu e-mail" required>
            </div>
            <div id="requestMsg" class="msg" style="display:none;"></div>
            <button type="submit" class="btn-login" id="reqBtn">Enviar link de redefinição</button>
          </form>
          <div class="back-link">
            <a href="/index.html">Voltar para o login</a>
          </div>
        </div>

        <!-- Etapa 2: Nova senha (quando token na URL) -->
        <div id="stepReset" style="display:none;">
          <p class="step-info">Crie uma nova senha para sua conta.</p>
          <form id="resetForm">
            <div class="form-group">
              <label for="newPassword">Nova Senha</label>
              <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirmar Senha</label>
              <input type="password" id="confirmPassword" placeholder="Repita a nova senha" required minlength="6">
            </div>
            <div id="resetMsg" class="msg" style="display:none;"></div>
            <button type="submit" class="btn-login" id="resetBtn">Salvar nova senha</button>
          </form>
        </div>

        <!-- Etapa 3: Sucesso -->
        <div id="stepSuccess" style="display:none; text-align:center; padding: 20px 0;">
          <div style="font-size: 3rem; margin-bottom: 16px;">✅</div>
          <h3 style="color: #1f2937; margin: 0 0 12px;">Senha redefinida!</h3>
          <p style="color: #6b7280; margin: 0 0 24px;">Sua senha foi alterada com sucesso.</p>
          <a href="/index.html" class="btn-login" style="text-decoration:none; display:block; text-align:center;">
            Ir para o Login
          </a>
        </div>

      </div>
    </div>
  </div>

  <script src="/js/config-api.js"></script>
  <script>
    const apiUrl = (() => {
      if (window.API_CONFIG && window.API_CONFIG.baseUrl) return window.API_CONFIG.baseUrl;
      const h = window.location.hostname;
      const isLocal = h === 'localhost' || h === '127.0.0.1';
      return isLocal ? `http://${h}:3000/api` : 'https://cloudd-agenda-backend.vercel.app/api';
    })();

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (token) {
      document.getElementById('stepRequest').style.display = 'none';
      document.getElementById('stepReset').style.display = 'block';
      document.getElementById('headerSubtitle').textContent = 'Nova Senha';
    }

    function showMsg(elId, message, isError) {
      const el = document.getElementById(elId);
      el.textContent = message;
      el.className = 'msg ' + (isError ? 'msg-error' : 'msg-success');
      el.style.display = 'block';
    }

    document.getElementById('requestForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('reqBtn');
      const email = document.getElementById('reqEmail').value.trim();
      btn.disabled = true;
      btn.textContent = 'Enviando...';
      try {
        const res = await fetch(`${apiUrl}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        showMsg('requestMsg', data.message || 'Verifique seu email.', false);
      } catch {
        showMsg('requestMsg', 'Erro de conexão. Tente novamente.', true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enviar link de redefinição';
      }
    });

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('resetBtn');
      const password = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (password !== confirm) {
        showMsg('resetMsg', 'As senhas não coincidem.', true);
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Salvando...';
      try {
        const res = await fetch(`${apiUrl}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();
        if (data.success) {
          document.getElementById('stepReset').style.display = 'none';
          document.getElementById('stepSuccess').style.display = 'block';
          document.getElementById('headerSubtitle').textContent = 'Senha Redefinida';
        } else {
          showMsg('resetMsg', data.message || 'Erro ao redefinir senha.', true);
        }
      } catch {
        showMsg('resetMsg', 'Erro de conexão. Tente novamente.', true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Salvar nova senha';
      }
    });
  </script>

  <style>
    .login-page {
      min-height: 100vh;
      background: linear-gradient(135deg, #5BA3F5 0%, #2C5282 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
    }
    .login-container { width: 100%; max-width: 420px; padding: 20px; }
    .login-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    .login-header {
      background: linear-gradient(135deg, #4f46e5, #0099ff);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }
    .login-logo h1 { margin: 0 0 8px; font-size: 2rem; font-weight: 700; }
    .login-logo p  { margin: 0; opacity: .9; font-size: .95rem; }
    .login-body { padding: 36px 32px; }
    .step-info { color: #4b5563; font-size: .9rem; margin: 0 0 24px; line-height: 1.6; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #1f2937; font-size: .9rem; }
    .form-group input {
      width: 100%; padding: 13px 16px; border: 2px solid #e5e7eb;
      border-radius: 10px; font-size: 1rem; box-sizing: border-box;
      background: #fafafa; color: #1f2937; transition: border-color .2s;
    }
    .form-group input:focus { outline: none; border-color: #4f46e5; background: white; }
    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #4f46e5, #0099ff);
      color: white; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: opacity .2s, transform .2s;
    }
    .btn-login:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .msg { padding: 12px 14px; border-radius: 8px; font-size: .88rem; margin-bottom: 16px; }
    .msg-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    .msg-error   { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
    .back-link { text-align: center; margin-top: 20px; }
    .back-link a { color: #4f46e5; font-size: .88rem; text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</body>
</html>
