<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agenda — Cloudd Agenda</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app-layout.css">
  <style>
    /* ── Export button ───────────────────────────── */
    .btn-export {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      white-space: nowrap;
    }
    .btn-export:hover { background: var(--bg); border-color: var(--accent); color: var(--accent); }
    .btn-export svg { flex-shrink: 0; }
    .patient-lookup-tag {
      display: none;
      margin-top: 5px;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      line-height: 1.4;
    }
    .patient-lookup-tag.found { background: #dcfce7; color: #15803d; }
    .patient-lookup-tag.new   { background: #f0f9ff; color: #0369a1; }
    .filter-pro-wrap { display: flex; align-items: center; gap: 6px; }
    .filter-pro-wrap label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    #filterEmployee, #filterStatus {
      height: 34px; padding: 0 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      max-width: 180px;
    }
    #filterEmployee:focus, #filterStatus:focus { outline: none; border-color: var(--accent); }
    /* ── Day-cell quick popup ────────────────────────── */
    #calDayPopup {
      position: fixed; z-index: 600;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 8px 28px rgba(0,0,0,.18);
      min-width: 190px;
      display: none;
    }
    #calDayPopup .cdp-date {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      margin-bottom: 10px; text-transform: capitalize;
    }
    #calDayPopup .cdp-question {
      font-size: 14px; font-weight: 700; color: var(--text);
      margin-bottom: 12px;
    }
    #calDayPopup .cdp-btn {
      display: block; width: 100%; text-align: left;
      padding: 7px 12px; border-radius: 7px; border: none;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background .12s;
    }
    #calDayPopup .cdp-btn-primary {
      background: var(--accent); color: #fff; margin-bottom: 6px;
    }
    #calDayPopup .cdp-btn-primary:hover { opacity: .88; }
    #calDayPopup .cdp-btn-secondary {
      background: var(--bg); color: var(--text-muted);
    }
    #calDayPopup .cdp-btn-secondary:hover { background: var(--border); color: var(--text); }
  </style>
</head>
<body>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script src="/js/config-api.js"></script>
<script>
// ══════════════════════════════════════════════════════════
//  CLOUDD AGENDA — Calendar App (Health Niche)
// ══════════════════════════════════════════════════════════

const API = (() => {
  if (window.API_CONFIG && window.API_CONFIG.baseUrl) return window.API_CONFIG.baseUrl;
  const h = window.location.hostname;
  return (h === 'localhost' || h === '127.0.0.1') ? `http://${h}:3000/api` : 'https://cloudd-agenda-backend.vercel.app/api';
})();

// Suporte a impersonação via admin panel
(function () {
  if (new URLSearchParams(window.location.search).get('imp') !== '1') return;
  const raw = sessionStorage.getItem('_imp');
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    sessionStorage.setItem('_impToken', d.token);
    sessionStorage.setItem('_impUser', JSON.stringify(d.user));
    sessionStorage.removeItem('_imp');
    history.replaceState({}, '', window.location.pathname);
  } catch (e) { /* ignore */ }
})();

const _isImpersonating = () => !!sessionStorage.getItem('_impToken');
const token = () => sessionStorage.getItem('_impToken') || localStorage.getItem('authToken');
const userData = () => {
  const imp = sessionStorage.getItem('_impUser');
  if (imp) try { return JSON.parse(imp); } catch { /* ignore */ }
  try { return JSON.parse(localStorage.getItem('userData') || 'null'); } catch { return null; }
};

// ── Toast ────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Auth ─────────────────────────────────────────────────
function checkAuth() {
  const user = userData();
  if (!user || !token()) { window.location.href = '/'; return null; }
  if (user.role === 'admin_master' && !_isImpersonating()) { window.location.href = '/admin/dashboard.html'; return null; }
  document.getElementById('sidebarUserName').textContent = user.name || user.email;
  return user;
}

// ── API helpers ──────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token(), ...opts.headers },
    ...opts,
  });
  if (res.status === 401) { window.location.href = '/'; return null; }
  return res.json();
}

// ── Calendar state ───────────────────────────────────────
const CAL = {
  view: 'semana',          // 'semana' | 'dia' | 'mes'
  anchor: new Date(),      // reference date
  appointments: [],
  employees: [],
  services: [],
  serviceColorMap: {},
  miniCalDate: new Date(),
  currentApptId: null,
  filterEmployee: null,    // employee_id string | null = todos
  filterStatus: null,      // status string | null = todos

  startHour: 7,
  endHour: 20,
  pxPerMin: 1,             // 60px / hour
};

function pxPerMin() { return CAL.endHour > CAL.startHour ? 60 : 1; }
function minutesSinceMidnight(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  return h * 60 + m;
}
function gridTop(timeStr) {
  const mins = minutesSinceMidnight(timeStr);
  const start = CAL.startHour * 60;
  return Math.max(0, (mins - start)) * pxPerMin();
}
function gridHeight(duration) {
  return Math.max(20, duration * pxPerMin());
}
function gridTotalH() {
  return (CAL.endHour - CAL.startHour) * 60 * pxPerMin();
}

// ── Date helpers ─────────────────────────────────────────
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}
function startOfWeek(d) {
  const r = new Date(d);
  const day = r.getDay();
  r.setDate(r.getDate() - day);
  return r;
}
function isSameDay(a, b) {
  return fmtDate(a) === fmtDate(b);
}
function ptMonth(d) {
  return d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
}
function ptShortDay(d) {
  return d.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.','').toUpperCase();
}

// ── Load data ────────────────────────────────────────────
async function loadAppointments() {
  const data = await apiFetch('/appointments');
  if (!data) return;
  CAL.appointments = Array.isArray(data) ? data : (data.appointments || data.data || []);
}

async function loadEmployees() {
  const data = await apiFetch('/staff');
  if (!data) return;
  CAL.employees = Array.isArray(data) ? data : (data.data || data.funcionarios || []);

  // Populate modal select
  const apptSel = document.getElementById('apptEmployee');
  if (apptSel) {
    const cur = apptSel.value;
    while (apptSel.options.length > 1) apptSel.remove(1);
    CAL.employees.forEach(e => apptSel.add(new Option(e.nome || e.name, e.id)));
    apptSel.value = cur;
  }

  // Populate filter dropdown
  const filterSel = document.getElementById('filterEmployee');
  const curFilter = filterSel.value;
  while (filterSel.options.length > 1) filterSel.remove(1);
  CAL.employees.forEach(e => filterSel.add(new Option(e.nome || e.name, e.id)));
  if (curFilter) filterSel.value = curFilter;
}

async function loadCalSettings() {
  try {
    const data = await apiFetch('/moderator/settings');
    const s = data?.data || data?.settings;
    if (!s?.services) return;
    const raw = typeof s.services === 'string' ? JSON.parse(s.services) : (Array.isArray(s.services) ? s.services : []);
    CAL.services = raw.map(item => typeof item === 'string' ? { name: item, duration: 30 } : item);
    CAL.serviceColorMap = {};
    CAL.services.forEach(svc => {
      if (svc.name && svc.color) CAL.serviceColorMap[svc.name.toLowerCase()] = svc.color;
    });
    populateServiceSelect();
  } catch(e) { /* non-critical */ }
}

function populateServiceSelect() {
  const sel = document.getElementById('apptService');
  if (!sel) return;
  const cur = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  CAL.services.forEach(svc => {
    const dur = svc.duration || 30;
    const durLabel = dur >= 60 ? (dur % 60 === 0 ? `${dur/60}h` : `${Math.floor(dur/60)}h${dur%60}min`) : `${dur}min`;
    const opt = new Option(`${svc.name} — ${durLabel}`, svc.name);
    opt.dataset.duration = dur;
    sel.add(opt);
  });
  if (cur) sel.value = cur;
}

function svcColorStyle(a) {
  const key = (a.service_type || '').toLowerCase();
  const hex = key ? CAL.serviceColorMap[key] : null;
  if (!hex || hex.length < 7) return '';
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const dr = Math.round(r * .38), dg = Math.round(g * .38), db = Math.round(b * .38);
  return `background:rgba(${r},${g},${b},.13);border-left-color:${hex};color:rgb(${dr},${dg},${db});`;
}

// ── Filter helpers ────────────────────────────────────────
function matchesEmployeeFilter(a) {
  if (!CAL.filterEmployee) return true;
  return String(a.employee_id) === String(CAL.filterEmployee);
}
function matchesStatusFilter(a) {
  if (!CAL.filterStatus) return true;
  return a.status === CAL.filterStatus;
}
function matchesFilters(a) {
  return matchesEmployeeFilter(a) && matchesStatusFilter(a);
}

// ── Week view ────────────────────────────────────────────
function weekRange() {
  const start = startOfWeek(CAL.anchor);
  return Array.from({ length: 7 }, (_, i) => addDays(start, i));
}

function buildDayBodyHtml(d) {
  const px = pxPerMin();
  let inner = '';
  for (let h = CAL.startHour; h < CAL.endHour; h++) {
    const top = (h - CAL.startHour) * 60 * px;
    inner += `<div class="cal-hour-line main" style="top:${top}px;"></div>`;
    inner += `<div class="cal-slot" data-date="${fmtDate(d)}" data-time="${String(h).padStart(2,'0')}:00" style="top:${top}px;height:${px*30}px;"></div>`;
    inner += `<div class="cal-slot" data-date="${fmtDate(d)}" data-time="${String(h).padStart(2,'0')}:30" style="top:${top+px*30}px;height:${px*30}px;"></div>`;
  }
  return inner;
}

function buildTimeColHtml(totalH) {
  const px = pxPerMin();
  let inner = '';
  for (let h = CAL.startHour; h < CAL.endHour; h++) {
    const top = (h - CAL.startHour) * 60 * px;
    inner += `<div class="cal-hour-mark" style="top:${top}px;">${String(h).padStart(2,'0')}:00</div>`;
  }
  return `<div class="cal-time-col-body" style="position:relative;height:${totalH}px;">${inner}</div>`;
}

// ── helpers shared by list views ─────────────────────────
function timeEnd(a) {
  const m = minutesSinceMidnight(a.appointment_time) + (a.duration_minutes || 60);
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}

function buildApptListItem(a) {
  const svcStyle = svcColorStyle(a);
  const showConfirm = a.status !== 'confirmed' && a.status !== 'cancelled' && a.status !== 'no_show';
  const showCancel  = a.status !== 'cancelled';
  const waNum = (a.customer_phone || '').replace(/\D/g, '');
  const waName = encodeURIComponent(a.customer_name || '');
  return `<div class="list-appt-item appt-card ${apptClass(a)}" data-id="${a.id}" draggable="true" style="${svcStyle}">
    <div class="list-appt-time">${a.appointment_time?.substring(0,5)} — ${timeEnd(a)}</div>
    <div class="list-appt-name">${a.customer_name}</div>
    ${a.customer_phone ? `<div class="list-appt-sub">${a.customer_phone}</div>` : ''}
    <div class="list-appt-sub">${a.service_type || apptTypeLabel(a)}</div>
    <div class="appt-quick-actions" draggable="false">
      ${showConfirm ? `<button class="qa-btn qa-confirm" data-action="confirm" data-appt-id="${a.id}" title="Confirmar">&#10003;</button>` : ''}
      <button class="qa-btn qa-edit" data-action="edit" data-appt-id="${a.id}" title="Editar">&#9998;</button>
      ${showCancel ? `<button class="qa-btn qa-cancel" data-action="cancel" data-appt-id="${a.id}" title="Cancelar">&#215;</button>` : ''}
      ${waNum ? `<button class="qa-btn qa-whatsapp" data-action="whatsapp" data-appt-id="${a.id}" data-phone="${waNum}" data-name="${waName}" title="WhatsApp">&#128172;</button>` : ''}
    </div>
  </div>`;
}

const _boundListContainers = new WeakSet();
function bindListApptClicks(container) {
  if (_boundListContainers.has(container)) return;
  _boundListContainers.add(container);
  container.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if (btn) {
      const action = btn.dataset.action;
      const id = btn.dataset.apptId;
      if (action === 'confirm') quickConfirm(id);
      else if (action === 'cancel') quickCancel(id);
      else if (action === 'edit') quickEdit(id);
      else if (action === 'whatsapp') quickWhatsApp(btn.dataset.phone, decodeURIComponent(btn.dataset.name));
      return;
    }
    const item = e.target.closest('.list-appt-item');
    if (item) openDetailModal(item.dataset.id);
  });
}

// ── Quick actions ─────────────────────────────────────────
window.quickConfirm = (id) => updateApptStatus(id, 'confirmed');
window.quickCancel  = (id) => { if (confirm('Cancelar este agendamento?')) updateApptStatus(id, 'cancelled'); };
window.quickEdit    = (id) => { const a = CAL.appointments.find(x => x.id == id); if (a) openEditModal(a); };
window.quickWhatsApp = (phone, name) => window.open(`https://wa.me/55${phone}?text=${encodeURIComponent('Olá ' + name + '!')}`, '_blank');

// ── Drag and drop ─────────────────────────────────────────
let _dragId = null;

function bindDragDrop(container) {
  container.querySelectorAll('.list-appt-item[draggable]').forEach(el => {
    el.addEventListener('dragstart', e => {
      _dragId = el.dataset.id;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => el.classList.add('dragging'), 0);
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      _dragId = null;
    });
  });

  container.querySelectorAll('.list-day-body').forEach(zone => {
    zone.addEventListener('dragover', e => {
      if (!_dragId) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      zone.classList.add('drag-over');
    });
    zone.addEventListener('dragleave', e => {
      if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over');
    });
    zone.addEventListener('drop', async e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      if (!_dragId) return;
      const newDate = zone.closest('.list-day-col')?.querySelector('.list-day-header')?.dataset.date;
      if (!newDate) return;
      const appt = CAL.appointments.find(a => a.id == _dragId);
      if (!appt || appt.appointment_date === newDate) return;
      const id = _dragId;
      _dragId = null;
      const result = await apiFetch(`/appointments/${id}`, {
        method: 'PUT',
        body: JSON.stringify({ appointment_date: newDate })
      });
      if (result?.success || result?.id || result?.appointment) {
        toast('Agendamento movido!', 'success');
        await loadAppointments();
        renderView();
      } else {
        toast('Erro ao mover agendamento', 'error');
      }
    });
  });
}

// ── Week view (list) ─────────────────────────────────────
function renderWeek() {
  const days = weekRange();
  const grid = document.getElementById('calGrid');
  const today = new Date();

  grid.style.gridTemplateColumns = '';
  grid.classList.add('list-mode');

  let html = '';
  days.forEach(d => {
    const dateStr = fmtDate(d);
    const isToday = isSameDay(d, today);
    const dayAppts = CAL.appointments
      .filter(a => (a.appointment_date||'').slice(0,10) === dateStr && matchesFilters(a))
      .sort((a, b) => (a.appointment_time||'').localeCompare(b.appointment_time||''));

    const apptHtml = dayAppts.length
      ? dayAppts.map(buildApptListItem).join('')
      : `<div style="font-size:12px;color:var(--text-muted);padding:16px 12px;text-align:center;">Sem agendamentos</div>`;

    html += `<div class="list-day-col ${isToday ? 'list-day-today' : ''}">
      <div class="list-day-header" data-date="${dateStr}" style="cursor:pointer;">
        <div class="cal-day-name">${ptShortDay(d)}</div>
        <div class="cal-day-num ${isToday ? 'today-circle' : ''}">${d.getDate()}</div>
      </div>
      <div class="list-day-body">
        ${apptHtml}
        <div class="list-add-btn" data-date="${dateStr}">+ Agendar</div>
      </div>
    </div>`;
  });

  grid.innerHTML = html;

  grid.querySelectorAll('.list-day-header[data-date]').forEach(h => {
    h.addEventListener('click', () => {
      CAL.anchor = new Date(h.dataset.date + 'T12:00:00');
      CAL.view = 'dia'; setActiveView('dia'); renderView();
    });
  });
  grid.querySelectorAll('.list-add-btn').forEach(btn => {
    btn.addEventListener('click', () => openNewApptModal(btn.dataset.date, '08:00'));
  });
  bindListApptClicks(grid);
  bindDragDrop(grid);

  const first = days[0], last = days[6];
  const sameMonth = first.getMonth() === last.getMonth();
  document.getElementById('calPeriodTitle').textContent = sameMonth
    ? `${first.getDate()} — ${last.getDate()} de ${first.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' })}`
    : `${first.toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' })} — ${last.toLocaleDateString('pt-BR', { day: 'numeric', month: 'short', year: 'numeric' })}`;
}

// ── Day view (list) ──────────────────────────────────────
function renderDay() {
  const d = CAL.anchor;

  const isToday = isSameDay(d, new Date());
  const dateStr = fmtDate(d);

    .filter(a => (a.appointment_date||'').slice(0,10) === dateStr && matchesFilters(a))

    : `<div style="text-align:center;padding:48px 20px;color:var(--text-muted);">

        <p style="font-size:14px;">Nenhum agendamento neste dia.</p>
        <button class="btn btn-primary" style="margin-top:14px;" onclick="openNewApptModal('${dateStr}','08:00')">+ Novo Agendamento</button>
      </div>`;

    <div class="list-day-header">

    d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

// ── Month view (Google Calendar style) ───────────────────
function renderMonth() {
  const grid = document.getElementById('calGrid');
  const anchor = CAL.anchor;
  const year = anchor.getFullYear(), month = anchor.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const today = new Date();

  // Reset list-mode from week view and use pure 7-col grid
  grid.classList.remove('list-mode');
  grid.style.gridTemplateColumns = 'repeat(7, 1fr)';
  grid.style.removeProperty('--grid-cols');

  // Status dot colors
  const dotColor = { pending:'#ca8a04', confirmed:'#16a34a', cancelled:'#ef4444', completed:'#4f46e5', no_show:'#6b7280' };

  // ── Header row ──
  const dayHeaders = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  let html = dayHeaders.map((d, i) => {
    const isWk = i === 0 || i === 6;
    return `<div class="month-hdr-cell" style="${isWk ? 'color:var(--text-muted);' : ''}">${d}.</div>`;
  }).join('');

  // ── Pad before month start ──
  const startPad = firstDay.getDay();
  for (let i = 0; i < startPad; i++) {
    const d2 = addDays(firstDay, -startPad + i);
    html += `<div class="month-day-cell month-day-other"><span class="month-day-num">${d2.getDate()}</span></div>`;
  }

  // ── Day cells ──
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(year, month, d);
    const dateStr = fmtDate(date);
    const isToday = isSameDay(date, today);
    const isWk = date.getDay() === 0 || date.getDay() === 6;
    const dayAppts = CAL.appointments
      .filter(a => (a.appointment_date||'').slice(0,10) === dateStr && matchesFilters(a))
      .sort((a, b) => (a.appointment_time||'').localeCompare(b.appointment_time||''));
    const visible = dayAppts.slice(0, 3);
    const overflow = dayAppts.length - 3;

    const eventsHtml = visible.map(a => {
      const svcHex = (a.service_type ? CAL.serviceColorMap[a.service_type.toLowerCase()] : null);
      const color = svcHex || dotColor[a.status] || '#ca8a04';
      const time = a.appointment_time?.substring(0,5);
      return `<div class="month-event" data-id="${a.id}" style="--evt-color:${color};">
        <span class="month-event-dot" style="background:${color};"></span>
        <span class="month-event-time">${time}</span>
        <span class="month-event-title">${a.customer_name}</span>
      </div>`;
    }).join('');

    html += `<div class="month-day-cell${isToday ? ' month-day-today' : ''}${isWk ? ' month-day-wk' : ''}" data-date="${dateStr}">
      <span class="month-day-num${isToday ? ' month-day-num-today' : ''}">${d}</span>
      ${eventsHtml}
      ${overflow > 0 ? `<div class="month-more" data-date="${dateStr}">Mais ${overflow}</div>` : ''}
    </div>`;
  }

  // ── End pad ──
  const totalCells = startPad + lastDay.getDate();
  const endPad = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= endPad; i++) {
    html += `<div class="month-day-cell month-day-other"><span class="month-day-num">${i}</span></div>`;
  }

  grid.innerHTML = html;

  document.getElementById('calPeriodTitle').textContent =
    firstDay.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

  // Click day cell → show quick popup
  grid.querySelectorAll('.month-day-cell[data-date]').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.month-event') || e.target.closest('.month-more')) return;
      showCalDayPopup(el.dataset.date, e.currentTarget);
    });
  });
  // Click event pill → open detail
  grid.querySelectorAll('.month-event').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); openDetailModal(el.dataset.id); });
  });
  // Click "Mais N" → switch to day view
  grid.querySelectorAll('.month-more').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      CAL.anchor = new Date(el.dataset.date + 'T12:00:00');
      CAL.view = 'dia'; setActiveView('dia'); renderView();
    });
  });
}

// ── Place appointments on week/day grid ──────────────────
function apptClass(a) {
  return a.status || 'pending';
}

function apptTypeLabel(a) {
  const notes = (a.notes || '').toLowerCase();
  if (notes.includes('retorno')) return 'Retorno';
  if (notes.includes('urgên') || notes.includes('urgen')) return 'Urgência';
  if (notes.includes('exame')) return 'Exame';
  if (notes.includes('proced')) return 'Procedimento';
  if (notes.includes('almoço') || notes.includes('almoco')) return 'Almoço';
  if (notes.includes('recado')) return 'Recado';
  return 'Consulta';
}

function placeAppointmentsOnGrid(days) {
  const dayStrings = days.map(fmtDate);

  CAL.appointments.forEach(a => {
    if (!dayStrings.includes((a.appointment_date||'').slice(0,10))) return;
    const col = document.querySelector(`.cal-day-col[data-date="${a.appointment_date}"]`);
    if (!col) return;

    const top = gridTop(a.appointment_time);
    const height = gridHeight(a.duration_minutes || 60);

    const card = document.createElement('div');
    card.className = `appt-card ${apptClass(a)}`;
    card.dataset.id = a.id;
    card.style.top = top + 'px';
    card.style.height = Math.max(height, 22) + 'px';

    const timeEnd = (() => {
      const m = minutesSinceMidnight(a.appointment_time) + (a.duration_minutes || 60);
      return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
    })();

    card.innerHTML = `
      <div class="appt-time">${a.appointment_time?.substring(0,5)} — ${timeEnd}</div>
      <div class="appt-name">${a.customer_name}</div>
      ${a.customer_phone ? `<div class="appt-phone">${a.customer_phone}</div>` : ''}
      <div class="appt-type">${apptTypeLabel(a)}</div>
    `;

    card.addEventListener('click', e => { e.stopPropagation(); openDetailModal(a.id); });
    col.appendChild(card);
  });
}

// ── Main render dispatcher ───────────────────────────────
function renderView() {
  updateBreadcrumb();
  if (CAL.view === 'semana') renderWeek();
  else if (CAL.view === 'dia') renderDay();
  else renderMonth();
  renderMiniCal(CAL.miniCalDate.getFullYear(), CAL.miniCalDate.getMonth());
}

function updateBreadcrumb() {
  const user = userData();
  document.getElementById('bcProfissional').textContent = user?.name || 'Agenda';
}

// ── Navigation ────────────────────────────────────────────
function navigate(dir) {
  const a = new Date(CAL.anchor);
  if (CAL.view === 'mes') a.setMonth(a.getMonth() + dir);
  else if (CAL.view === 'semana') a.setDate(a.getDate() + dir * 7);
  else a.setDate(a.getDate() + dir);
  CAL.anchor = a;
  renderView();
}

function setActiveView(v) {
  CAL.view = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
}

// ── Mini calendar ─────────────────────────────────────────
function renderMiniCal(year, month) {
  const title = document.getElementById('miniCalTitle');
  const grid = document.getElementById('miniCalGrid');
  title.textContent = new Date(year, month, 1).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

  const today = new Date();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);

  const days = ['Do','Se','Te','Qu','Qu','Se','Sá'];
  let html = days.map(d => `<div class="mini-cal-day-name">${d}</div>`).join('');

  const pad = firstDay.getDay();
  for (let i = 0; i < pad; i++) {
    const d = addDays(firstDay, -pad + i);
    html += `<div class="mini-cal-day other-month">${d.getDate()}</div>`;
  }

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(year, month, d);
    const isToday = isSameDay(date, today);
    const isSelected = isSameDay(date, CAL.anchor);
    const dateStr = fmtDate(date);
    const hasAppt = CAL.appointments.some(a => (a.appointment_date||'').slice(0,10) === dateStr);
    html += `<div class="mini-cal-day ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}"
      data-date="${dateStr}" style="position:relative;"
      title="${date.toLocaleDateString('pt-BR')}">
      ${d}
      ${hasAppt && !isToday ? `<span style="position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent);display:block;"></span>` : ''}
    </div>`;
  }

  grid.innerHTML = html;

  grid.querySelectorAll('.mini-cal-day[data-date]').forEach(el => {
    el.addEventListener('click', () => {
      CAL.anchor = new Date(el.dataset.date + 'T12:00:00');
      if (CAL.view === 'mes') { CAL.view = 'dia'; setActiveView('dia'); }
      renderView();
    });
  });
}

// ── New appointment modal ─────────────────────────────────
function openNewApptModal(date, time) {

  document.getElementById('apptEditId').value = '';

function openEditModal(appt) {
  CAL.currentApptId = appt.id;
  document.getElementById('modalApptTitle').textContent = 'Editar Agendamento';
  document.getElementById('apptEditId').value = appt.id;
  document.getElementById('apptName').value = appt.customer_name || '';

// ── Save appointment ──────────────────────────────────────
async function saveAppointment() {
  const id = document.getElementById('apptEditId').value;
  const body = {
    customer_name: document.getElementById('apptName').value.trim(),
    customer_phone: document.getElementById('apptPhone').value.trim(),
    customer_cpf: document.getElementById('apptCpf').value.trim() || null,
    customer_email: document.getElementById('apptEmail').value.trim(),
    appointment_date: document.getElementById('apptDate').value,
    appointment_time: document.getElementById('apptTime').value,
    duration_minutes: parseInt(document.getElementById('apptDuration').value) || 30,
    status: document.getElementById('apptStatus').value,
    service_type: document.getElementById('apptService').value,
    notes: document.getElementById('apptNotes').value.trim(),
    employee_id: document.getElementById('apptEmployee').value || null,
  };

  if (!body.customer_name || !body.appointment_date || !body.appointment_time) {
    toast('Preencha os campos obrigatórios (nome, data e horário)', 'error');
    return;
  }
  if (!body.service_type) {
    toast('Selecione um serviço', 'error');
    return;
  }

  const btn = document.getElementById('modalApptSave');
  btn.disabled = true;
  btn.textContent = 'Salvando...';

  try {
    let result;
    if (id) {
      result = await apiFetch(`/appointments/${id}`, { method: 'PUT', body: JSON.stringify(body) });
    } else {
      result = await apiFetch('/appointments', { method: 'POST', body: JSON.stringify(body) });
    }

    if (result && (result.success || result.id || result.appointment)) {
      toast(id ? 'Agendamento atualizado!' : 'Agendamento criado!', 'success');
      closeModal('modalNewAppt');
      await loadAppointments();
      renderView();
    } else {
      toast(result?.message || result?.error || 'Erro ao salvar agendamento', 'error');
    }
  } catch (e) {
    toast('Erro de conexão', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = id ? 'Salvar Alterações' : 'Salvar Agendamento';
  }
}

async function updateApptStatus(id, status) {
  const result = await apiFetch(`/appointments/${id}`, { method: 'PUT', body: JSON.stringify({ status }) });
  if (result && (result.success || result.id || result.appointment || result.data)) {
    const labels = { confirmed:'Confirmado', cancelled:'Cancelado', pending:'Pendente', completed:'Concluído', no_show:'Faltou' };
    toast(`Marcado como ${labels[status] || status}`, 'success');
    closeModal('modalDetail');
    await loadAppointments();
    renderView();
  } else {
    toast(result?.message || result?.error || 'Erro ao atualizar status', 'error');
  }
}

async function deleteAppointment(id) {
  if (!confirm('Excluir este agendamento? Esta ação não pode ser desfeita.')) return;
  const result = await apiFetch(`/appointments/${id}`, { method: 'DELETE' });
  if (result && (result.success || result.message)) {
    toast('Agendamento excluído', 'info');
    closeModal('modalNewAppt');
    await loadAppointments();
    renderView();
  } else {
    toast('Erro ao excluir agendamento', 'error');
  }
}

// ── Modal helpers ─────────────────────────────────────────

// ── PDF Export ────────────────────────────────────────────
function exportPDF(mode) {
  const anchor = new Date(CAL.anchor);
  const statusLabels = {
    pending: 'Pendente', confirmed: 'Confirmado',
    cancelled: 'Cancelado', completed: 'Concluído', no_show: 'Faltou'
  };

  let title, appts;

  if (mode === 'dia') {
    const dateStr = fmtDate(anchor);
    appts = CAL.appointments
      .filter(a => (a.appointment_date||'').slice(0,10) === dateStr)
      .sort((a, b) => (a.appointment_time||'').localeCompare(b.appointment_time||''));
    title = `Agenda — ${anchor.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}`;

  } else if (mode === 'semana') {
    const days = weekRange();
    const start = fmtDate(days[0]), end = fmtDate(days[6]);
    appts = CAL.appointments
      .filter(a => { const d = (a.appointment_date||'').slice(0,10); return d >= start && d <= end; })
      .sort((a, b) => (a.appointment_date||'').localeCompare(b.appointment_date||'') || (a.appointment_time||'').localeCompare(b.appointment_time||''));
    title = `Agenda — Semana de ${days[0].toLocaleDateString('pt-BR', { day: 'numeric', month: 'long' })} a ${days[6].toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' })}`;

  } else {
    const year = anchor.getFullYear(), month = anchor.getMonth();
    const startStr = `${year}-${String(month+1).padStart(2,'0')}-01`;
    const endStr = fmtDate(new Date(year, month+1, 0));
    appts = CAL.appointments
      .filter(a => { const d = (a.appointment_date||'').slice(0,10); return d >= startStr && d <= endStr; })
      .sort((a, b) => (a.appointment_date||'').localeCompare(b.appointment_date||'') || (a.appointment_time||'').localeCompare(b.appointment_time||''));
    title = `Agenda — ${anchor.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' })}`;
  }

  const rows = appts.map(a => {
    const date = new Date(a.appointment_date + 'T00:00').toLocaleDateString('pt-BR');
    const start = a.appointment_time?.substring(0,5) || '—';
    const totalMin = (a.appointment_time ? minutesSinceMidnight(a.appointment_time) : 0) + (a.duration_minutes || 60);
    const end = `${String(Math.floor(totalMin/60)).padStart(2,'0')}:${String(totalMin%60).padStart(2,'0')}`;
    const status = statusLabels[a.status] || a.status || '—';
    const statusColor = { Pendente:'#f59e0b', Confirmado:'#16a34a', Cancelado:'#94a3b8', Concluído:'#4f46e5', Faltou:'#6b7280' }[status] || '#999';
    return `<tr>
      <td>${date}</td>
      <td style="white-space:nowrap;">${start} — ${end}</td>
      <td style="font-weight:600;">${a.customer_name || '—'}</td>
      <td>${a.customer_phone || '—'}</td>
      <td>${apptTypeLabel(a)}</td>
      <td><span style="display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;background:${statusColor}20;color:${statusColor};">${status}</span></td>
    </tr>`;
  }).join('');

  const user = userData();
  const companyName = user?.company_name || user?.name || 'Cloudd Agenda';
  const now = new Date().toLocaleString('pt-BR');

  const html = `<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>${title}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; color: #111; padding: 32px; background: #fff; }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; border-bottom: 2px solid #111; padding-bottom: 16px; }
    .header-left h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .header-left p { font-size: 11px; color: #666; }
    .header-right { text-align: right; font-size: 11px; color: #666; }
    .header-right strong { display: block; font-size: 13px; font-weight: 700; color: #111; margin-bottom: 2px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th { background: #f3f4f6; text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #555; border-bottom: 1.5px solid #e5e7eb; }
    td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .empty { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
    .footer { margin-top: 24px; font-size: 10px; color: #aaa; text-align: right; }
    @media print { body { padding: 16px; } @page { margin: 1cm; } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <h1>${title}</h1>
      <p>Total: ${appts.length} agendamento${appts.length !== 1 ? 's' : ''}</p>
    </div>
    <div class="header-right">
      <strong>${companyName}</strong>
      Gerado em ${now}
    </div>
  </div>
  ${appts.length
    ? `<table>
        <thead><tr><th>Data</th><th>Horário</th><th>Paciente</th><th>Telefone</th><th>Tipo</th><th>Status</th></tr></thead>
        <tbody>${rows}</tbody>
       </table>`
    : `<div class="empty">Nenhum agendamento no período selecionado.</div>`}
  <div class="footer">Cloudd Agenda — ${now}</div>
</body>
</html>`;

  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 400);
}

// ── Waiting list (simulated from pending appointments) ────
function renderWaitingList() {
  const today = fmtDate(new Date());
  const pending = CAL.appointments.filter(a => a.status === 'pending' && a.appointment_date === today);
  const urgency = pending.filter(a => (a.notes || '').toLowerCase().includes('urgên') || (a.notes || '').toLowerCase().includes('urgen'));
  const normal = pending.filter(a => !urgency.includes(a));

  function itemHtml(a) {
    const initials = a.customer_name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
    return `<div class="waiting-item" data-id="${a.id}">
      <div class="waiting-avatar">${initials}</div>
      <div>
        <div class="waiting-name">${a.customer_name}</div>
        <div class="waiting-time">${a.appointment_time?.substring(0,5)}</div>
      </div>
    </div>`;
  }

  document.getElementById('urgencyList').innerHTML = urgency.length
    ? urgency.map(itemHtml).join('') : '<div style="font-size:11px;color:var(--text-muted);padding:4px 0;">Nenhum</div>';

  document.getElementById('normalWaitList').innerHTML = normal.length
    ? normal.map(itemHtml).join('') : '<div style="font-size:11px;color:var(--text-muted);padding:4px 0;">Nenhum</div>';

  document.querySelectorAll('.waiting-item').forEach(el => {
    el.addEventListener('click', () => openDetailModal(el.dataset.id));
  });
}

// ── Patient lookup (phone field in appointment modal) ─────
let _lookupTimer = null;

function clearPatientLookup() {
  const tag = document.getElementById('patientLookupTag');
  tag.style.display = 'none';
  tag.className = 'patient-lookup-tag';
  tag.textContent = '';
}

document.getElementById('apptPhone').addEventListener('input', function () {
  clearTimeout(_lookupTimer);
  const raw = this.value.replace(/\D/g, '');
  if (raw.length < 7) { clearPatientLookup(); return; }
  _lookupTimer = setTimeout(async () => {
    try {
      const data = await apiFetch('/patients/search?q=' + encodeURIComponent(this.value.trim()));
      if (!data) return;
      const tag = document.getElementById('patientLookupTag');
      if (data.patients && data.patients.length > 0) {
        const p = data.patients[0];
        tag.className = 'patient-lookup-tag found';
        tag.innerHTML = `Paciente cadastrado: <strong>${p.name}</strong>${p.health_insurance ? ' &mdash; ' + p.health_insurance : ''}`;
        tag.style.display = 'block';
        const nameInput = document.getElementById('apptName');
        if (!nameInput.value.trim()) nameInput.value = p.name;
        if (!document.getElementById('apptCpf').value.trim() && p.cpf) document.getElementById('apptCpf').value = p.cpf;
        if (!document.getElementById('apptEmail').value.trim() && p.email) document.getElementById('apptEmail').value = p.email;
      } else {
        tag.className = 'patient-lookup-tag new';
        tag.textContent = 'Novo paciente — ficha será criada automaticamente ao salvar';
        tag.style.display = 'block';
      }
    } catch { /* silent */ }
  }, 400);
});

// ── Patient lookup (CPF field) ────────────────────────────
let _cpfLookupTimer = null;
document.getElementById('apptCpf').addEventListener('input', function () {
  clearTimeout(_cpfLookupTimer);
  const digits = this.value.replace(/\D/g, '');
  if (digits.length < 11) return;
  _cpfLookupTimer = setTimeout(async () => {
    try {
      const data = await apiFetch('/patients/search?q=' + encodeURIComponent(this.value.trim()));
      if (!data) return;
      const tag = document.getElementById('patientLookupTag');
      if (data.patients && data.patients.length > 0) {
        const p = data.patients[0];
        tag.className = 'patient-lookup-tag found';
        tag.innerHTML = `Paciente cadastrado: <strong>${p.name}</strong>${p.health_insurance ? ' &mdash; ' + p.health_insurance : ''}`;
        tag.style.display = 'block';

// ── Init ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const user = checkAuth();
  if (!user) return;

  // ── Quick popup ao clicar em dia vazio do mês ──────────
  let _cdpDate = null;

  window.showCalDayPopup = function showCalDayPopup(dateStr, cellEl) {
    _cdpDate = dateStr;
    const popup = document.getElementById('calDayPopup');
    const d = new Date(dateStr + 'T12:00:00');
    document.getElementById('calDayPopupDate').textContent =
      d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    popup.style.display = 'block';
    const rect = cellEl.getBoundingClientRect();
    popup.style.top  = (rect.bottom + 4) + 'px';
    popup.style.left = rect.left + 'px';

    requestAnimationFrame(() => {
      const pr = popup.getBoundingClientRect();
      if (pr.right  > window.innerWidth  - 8) popup.style.left = (window.innerWidth  - pr.width  - 8) + 'px';
      if (pr.bottom > window.innerHeight - 8) popup.style.top  = (rect.top - pr.height - 4) + 'px';
    });
  }

  window.calDayPopupNewAppt = function() {
    const date = _cdpDate;
    document.getElementById('calDayPopup').style.display = 'none';
    _cdpDate = null;
    openNewApptModal(date);
  };

  window.calDayPopupViewDay = function() {
    const date = _cdpDate;
    document.getElementById('calDayPopup').style.display = 'none';
    _cdpDate = null;
    CAL.anchor = new Date(date + 'T12:00:00');
    CAL.view = 'dia'; setActiveView('dia'); renderView();
  };

  document.addEventListener('click', e => {
    const popup = document.getElementById('calDayPopup');
    if (popup.style.display !== 'none' && !popup.contains(e.target) && !e.target.closest('.month-day-cell')) {
      popup.style.display = 'none';
      _cdpDate = null;
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      const popup = document.getElementById('calDayPopup');
      popup.style.display = 'none';
      _cdpDate = null;
    }
  });

  try {
    await Promise.all([loadAppointments(), loadEmployees(), loadCalSettings()]);
    renderView();
    renderWaitingList();

    // Auto-refresh every 60s — cleared on page unload to avoid stale callbacks
    const refreshTimer = setInterval(async () => {
      await loadAppointments();
      renderView();
      renderWaitingList();
    }, 60000);
    window.addEventListener('beforeunload', () => clearInterval(refreshTimer), { once: true });
  } catch(e) {
    console.error('Erro ao inicializar agenda:', e);
    toast('Erro ao carregar dados', 'error');
  }
});
</script>
